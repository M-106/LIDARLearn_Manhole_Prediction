dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetHELIALS.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: train
  val:
    _base_: cfgs/dataset/TreeDatasetHELIALS.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: val
  test:
    _base_: cfgs/dataset/TreeDatasetHELIALS.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: test
grad_norm_clip: 10
max_epoch: 250
model:
  NAME: PointTransformerV2
  channels_input: 3
  label_smoothing: 0.0
  num_classes: 9
  grid_sizes: [0.06, 0.15, 0.375, 0.9375]
  enc_depths: [2, 2, 6, 2]
  enc_channels: [96, 192, 384, 512]
  enc_groups: [12, 24, 48, 64]
  drop_path_rate: 0.3
npoints: 2048
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
