dataset:
  train:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: train
      way: 5
      shot: 10
      fold: 0
  val:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: test
      way: 5
      shot: 10
      fold: 0
grad_norm_clip: 10
max_epoch: 150
model:
  NAME: PointTransformerV2
  channels_input: 3
  drop_path_rate: 0.3
  enc_channels:
  - 96
  - 192
  - 384
  - 512
  enc_depths:
  - 2
  - 2
  - 6
  - 2
  enc_groups:
  - 12
  - 24
  - 48
  - 64
  grid_sizes:
  - 0.06
  - 0.15
  - 0.375
  - 0.9375
  label_smoothing: 0.0
  num_classes: 5
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
