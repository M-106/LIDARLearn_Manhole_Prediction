dataset:
  train:
    _base_: cfgs/dataset/ModelNet40Dataset.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: train
  val:
    _base_: cfgs/dataset/ModelNet40Dataset.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: val
grad_norm_clip: 10
max_epoch: 250
model:
  NAME: DAPT
  init_source: ShapeNet
  base_model: RECON
  class_token: use
  cls_dim: 40
  depth: 12
  drop_adapter_rate: 0
  drop_path_rate: 0.1
  drop_rate: 0.0
  encoder_dims: 384
  finetuning_strategy: DAPT
  group_size: 32
  label_smoothing: 0.0
  num_group: 64
  num_heads: 6
  patch_token: max
  prompt_token: None
  rank: 72
  trans_dim: 384
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.05
  type: AdamW
  part: dapt
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
