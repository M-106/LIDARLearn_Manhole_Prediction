optimizer:
  type: AdamW
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: train
      K_FOLDS: 5
      fold: 0
      bs: 16
  val:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: val
      K_FOLDS: 5
      fold: 0
      bs: 16
model:
  NAME: PointTNT
  label_smoothing: 0.0
  num_classes: 7
  channels: 3
  point_dim: 32
  patch_dim: 192
  depth: 4
  heads: 3
  dim_head: 64
  ff_dropout: 0.0
  attn_dropout: 0.0
  emb_dims: 1024
  n_anchor: 192
  k: 8
  dilation: 1
  dropout: 0.5
npoints: 1024
step_per_update: 1
max_epoch: 250
grad_norm_clip: 10
