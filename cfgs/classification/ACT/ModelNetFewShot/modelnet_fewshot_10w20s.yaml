dataset:
  train:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: train
      way: 10
      shot: 20
      fold: 0
  val:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: test
      way: 10
      shot: 20
      fold: 0
grad_norm_clip: 10
max_epoch: 150
model:
  NAME: ACT
  base_model: ACT
  cls_dim: 10
  depth: 12
  drop_path_rate: 0.1
  embed_dim: 384
  encoder_dims: 384
  finetuning_strategy: Full Finetuning
  group_size: 32
  init_source: ShapeNet
  label_smoothing: 0.0
  num_group: 64
  num_heads: 6
  transfer_type: full
npoints: 1024
optimizer:
  kwargs:
    lr: 1.0e-05
    weight_decay: 0.05
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
