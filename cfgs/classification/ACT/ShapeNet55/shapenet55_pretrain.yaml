optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.05


scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10


dataset:
  train:
    _base_: cfgs/dataset/ShapeNet55Pretrain.yaml
    others:
      subset: train
      npoints: 1024
      whole: true
      bs: 64
  val:
    _base_: cfgs/dataset/ShapeNet55Pretrain.yaml
    others:
      subset: test
      npoints: 1024
      bs: 32


model:
  NAME: ACT_PointDistillation_Pretrain
  pretrain_dataset: ShapeNet55
  loss: cosine

  transformer_config:
    mask_ratio: 0.8
    mask_type: 'rand'
    proj: linear
    embed_dim: 384
    encoder_dims: 384
    depth: 12
    drop_path_rate: 0.1
    cls_dim: 512
    replace_pob: 0.
    num_heads: 6
    decoder_depth: 2
    decoder_num_heads: 6
    return_all_tokens: False
    cls_loss: False
    register_shallow_hook: 9

  dvae_config:
    visual_embed_type: vit_base_patch16_384
    visual_embed_dim: 768
    visual_embed_pos: after_dgcnn1
    freeze_visual_embed: true
    num_prompt_token: 64
    use_deep_prompt: true
    num_group: 64
    group_size: 32
    encoder_dims: 384
    num_tokens: 8192
    tokens_dims: 384
    decoder_dims: 384
    ckpt: 'pretrained/act_dvae.pth'

step_per_update: 1
max_epoch: 300
pretrain_augmentation: none

consider_metric: CDL1
