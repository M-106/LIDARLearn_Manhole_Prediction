dataset:
  train:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: train
      way: 10
      shot: 10
      fold: 0
  val:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: test
      way: 10
      shot: 10
      fold: 0
grad_norm_clip: 10
max_epoch: 150
model:
  NAME: PointKAN
  alpha: 1.0
  beta: 1.0
  channels_input: 3
  label_smoothing: 0.0
  num_classes: 10
  poly_degree: 4
  scale: 3.0
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
