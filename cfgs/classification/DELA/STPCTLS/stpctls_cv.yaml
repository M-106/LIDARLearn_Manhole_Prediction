optimizer:
  type: AdamW
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: train
      K_FOLDS: 5
      fold: 0
      bs: 16
  val:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: val
      K_FOLDS: 5
      fold: 0
      bs: 16
model:
  NAME: DELA
  depths:
  - 4
  - 4
  - 4
  dims:
  - 96
  - 192
  - 384
  ns:
  - 1024
  - 256
  - 64
  ks:
  - 20
  - 20
  - 20
  nbr_dims:
  - 48
  - 48
  bottleneck: 2048
  num_classes: 7
  drop_path: 0.15
  bn_momentum: 0.1
  mlp_ratio: 2
  cor_std:
  - 2.8
  - 5.3
  - 10
  label_smoothing: 0.0
npoints: 1024
step_per_update: 1
max_epoch: 250
grad_norm_clip: 10
