dataset:
  train:
    _base_: cfgs/dataset/TreeDataset.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: train
  val:
    _base_: cfgs/dataset/TreeDataset.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: val
grad_norm_clip: 10
max_epoch: 250
model:
  NAME: PointGPT_VPT_Deep
  init_source: ShapeNet
  base_model: PointGPT
  cls_dim: 7
  depth: 12
  drop_path_rate: 0.1
  encoder_dims: 384
  finetuning_strategy: VPT_Deep
  group_size: 32
  prompt_nums: 10
  label_smoothing: 0.0
  num_group: 64
  num_heads: 6
  trans_dim: 384
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.05
  type: AdamW
  part: only_new
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
