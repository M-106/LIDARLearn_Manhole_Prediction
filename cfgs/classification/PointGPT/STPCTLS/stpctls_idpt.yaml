dataset:
  train:
    _base_: cfgs/dataset/TreeDataset.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: train
  val:
    _base_: cfgs/dataset/TreeDataset.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: val
grad_norm_clip: 10
max_epoch: 250
model:
  NAME: PointGPT_IDPT
  init_source: ShapeNet
  base_model: PointGPT
  cls_dim: 7
  cls_type: all
  decoder_depth: 4
  depth: 12
  drop_path_rate: 0.1
  encoder_dims: 384
  finetuning_strategy: IDPT
  group_size: 32
  label_smoothing: 0.0
  loss: cdl12
  num_group: 64
  num_heads: 6
  prompt_layer: 11
  prompt_module: dgcnn
  trans_dim: 384
  type: idpt
  weight_center: 1
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.05
  type: AdamW
  part: only_new
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
