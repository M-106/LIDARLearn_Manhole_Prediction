dataset:
  train:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: train
      way: 5
      shot: 20
      fold: 0
  val:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: test
      way: 5
      shot: 20
      fold: 0
grad_norm_clip: 10
max_epoch: 150
model:
  NAME: PointGPT_DAPT
  base_model: PointGPT
  cls_dim: 5
  decoder_depth: 4
  depth: 12
  drop_path_rate: 0.1
  encoder_dims: 384
  finetuning_strategy: DAPT
  group_size: 32
  init_source: ShapeNet
  label_smoothing: 0.0
  loss: cdl2
  num_group: 64
  num_heads: 6
  trans_dim: 384
  weight_center: 1
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.05
  part: dapt
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
