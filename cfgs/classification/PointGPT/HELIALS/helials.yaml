dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetHELIALS.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: train
  val:
    _base_: cfgs/dataset/TreeDatasetHELIALS.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: val
  test:
    _base_: cfgs/dataset/TreeDatasetHELIALS.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: test
grad_norm_clip: 10
max_epoch: 250
model:
  NAME: PointGPT
  init_source: HELIALS
  base_model: PointGPT
  cls_dim: 9
  decoder_depth: 4
  depth: 12
  drop_path_rate: 0.1
  encoder_dims: 384
  finetuning_strategy: Full Finetuning
  group_size: 32
  label_smoothing: 0.0
  loss: cdl12
  num_group: 64
  num_heads: 6
  trans_dim: 384
  type: full
  weight_center: 1
npoints: 2048
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.05
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
