dataset:
  train:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: train
      way: 5
      shot: 20
      fold: 0
  val:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: test
      way: 5
      shot: 20
      fold: 0
grad_norm_clip: 10
max_epoch: 150
model:
  NAME: PPT
  base_model: PointMAE
  cls_dim: 5
  depth: 12
  drop_path_rate: 0.3
  embed_dim: 384
  finetuning_strategy: PPT
  group_size: 32
  init_source: ShapeNet
  label_smoothing: 0.0
  num_group: 64
  num_heads: 6
  prompt_group_size: 32
  prompt_num_group: 64
  type: pos
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.05
  part: ppt
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
