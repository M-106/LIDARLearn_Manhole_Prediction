dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetPretrain.yaml
    others:
      subset: train
      npoints: 2048
  val:
    _base_: cfgs/dataset/TreeDatasetPretrain.yaml
    others:
      subset: val
      npoints: 2048
  extra_train:
    _base_: cfgs/dataset/TreeDatasetPretrain.yaml
    others:
      subset: extra_train
      npoints: 2048
max_epoch: 300
model:
  NAME: PointMAE_Pretrain
  pretrain_dataset: HELIAS
  group_size: 32
  num_group: 64
  loss: cdl2
  transformer_config:
    mask_ratio: 0.6
    mask_type: rand
    trans_dim: 384
    encoder_dims: 384
    depth: 12
    drop_path_rate: 0.1
    num_heads: 6
    decoder_depth: 4
    decoder_num_heads: 6
npoints: 2048
optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.05
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
step_per_update: 1
pretrain_augmentation: z_rotate_tree  # augmentation applied during pretraining (see datasets/augmentation.py AUGMENTATION_REGISTRY)
