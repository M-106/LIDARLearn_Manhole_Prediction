dataset:
  train:
    _base_: cfgs/dataset/ModelNet40Dataset.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: train
  val:
    _base_: cfgs/dataset/ModelNet40Dataset.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: val
grad_norm_clip: 10
max_epoch: 250
model:
  NAME: PPT
  init_source: ShapeNet
  base_model: PointMAE
  cls_dim: 40
  depth: 12
  drop_path_rate: 0.3
  embed_dim: 384
  finetuning_strategy: PPT
  group_size: 32
  label_smoothing: 0.0
  num_group: 64
  num_heads: 6
  prompt_group_size: 32
  prompt_num_group: 64
  type: pos
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.05
  type: AdamW
  part: ppt
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
