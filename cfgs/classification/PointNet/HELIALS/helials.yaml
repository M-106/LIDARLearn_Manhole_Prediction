optimizer:
  type: AdamW
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetHELIALS.yaml
    others:
      subset: train
      K_FOLDS: 1
      bs: 16
  val:
    _base_: cfgs/dataset/TreeDatasetHELIALS.yaml
    others:
      subset: val
      K_FOLDS: 1
      bs: 16
  test:
    _base_: cfgs/dataset/TreeDatasetHELIALS.yaml
    others:
      subset: test
      K_FOLDS: 1
      bs: 16
model:
  NAME: PointNet
  label_smoothing: 0.0
  input_channels: 3
  emb_dims: 1024
  dropout: 0.4
  feature_transform: true
  num_classes: 9
  channels: 3
npoints: 2048
step_per_update: 1
max_epoch: 250
grad_norm_clip: 10
