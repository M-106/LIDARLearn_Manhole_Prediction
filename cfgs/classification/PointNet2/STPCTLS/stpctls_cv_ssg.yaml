optimizer:
  type: AdamW
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: train
      K_FOLDS: 5
      fold: 0
      bs: 16
  val:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: val
      K_FOLDS: 5
      fold: 0
      bs: 16
model:
  NAME: PointNet2_SSG
  label_smoothing: 0.0
  npoint1: 512
  npoint2: 128
  radius1: 0.2
  radius2: 0.4
  nsample1: 64
  nsample2: 64
  mlp1:
  - 0
  - 64
  - 64
  - 128
  mlp2:
  - 128
  - 128
  - 128
  - 256
  mlp3:
  - 256
  - 256
  - 512
  - 1024
  dropout: 0.5
  num_classes: 7
  channels: 3
npoints: 1024
step_per_update: 1
max_epoch: 250
grad_norm_clip: 10
