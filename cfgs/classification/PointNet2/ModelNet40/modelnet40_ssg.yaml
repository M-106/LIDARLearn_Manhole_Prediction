dataset:
  train:
    _base_: cfgs/dataset/ModelNet40Dataset.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: train
  val:
    _base_: cfgs/dataset/ModelNet40Dataset.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: val
grad_norm_clip: 10
max_epoch: 250
model:
  NAME: PointNet2_SSG
  channels: 3
  dropout: 0.5
  label_smoothing: 0.0
  mlp1:
  - 0
  - 64
  - 64
  - 128
  mlp2:
  - 128
  - 128
  - 128
  - 256
  mlp3:
  - 256
  - 256
  - 512
  - 1024
  npoint1: 512
  npoint2: 128
  nsample1: 64
  nsample2: 64
  num_classes: 40
  radius1: 0.2
  radius2: 0.4
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
