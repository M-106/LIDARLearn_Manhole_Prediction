optimizer:
  type: AdamW
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: train
      K_FOLDS: 5
      fold: 0
      bs: 16
  val:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: val
      K_FOLDS: 5
      fold: 0
      bs: 16
model:
  NAME: MSDGCNN
  label_smoothing: 0.0
  channels_input: 3
  num_classes: 7
  k1: 20
  k2: 30
  k3: 40
  fps_points: 512
  dropout: 0.5
npoints: 1024
step_per_update: 1
max_epoch: 250
grad_norm_clip: 10
