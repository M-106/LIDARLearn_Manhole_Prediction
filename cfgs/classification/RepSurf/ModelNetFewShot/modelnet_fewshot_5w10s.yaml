dataset:
  train:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: train
      way: 5
      shot: 10
      fold: 0
  val:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: test
      way: 5
      shot: 10
      fold: 0
grad_norm_clip: 10
max_epoch: 150
model:
  NAME: RepSurf
  cuda_ops: true
  dropout1: 0.4
  dropout2: 0.4
  group_size: 8
  label_smoothing: 0.0
  num_classes: 5
  num_point: 1024
  return_center: true
  return_dist: true
  return_polar: true
  umb_pool: sum
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
