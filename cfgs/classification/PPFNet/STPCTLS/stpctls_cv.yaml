optimizer:
  type: AdamW
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: train
      K_FOLDS: 5
      fold: 0
      bs: 16
  val:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: val
      K_FOLDS: 5
      fold: 0
      bs: 16
model:
  NAME: PPFNet
  label_smoothing: 0.0
  features:
  - ppf
  - dxyz
  - xyz
  emb_dims: 96
  radius: 0.3
  num_neighbors: 20
  dropout1: 0.2
  dropout2: 0.2
  num_classes: 7
  channels: 3
npoints: 1024
step_per_update: 1
max_epoch: 250
grad_norm_clip: 10
