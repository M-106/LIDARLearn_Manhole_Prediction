dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetPretrain.yaml
    others:
      subset: train
      npoints: 2048
  val:
    _base_: cfgs/dataset/TreeDatasetPretrain.yaml
    others:
      subset: val
      npoints: 2048
  extra_train:
    _base_: cfgs/dataset/TreeDatasetPretrain.yaml
    others:
      subset: extra_train
      npoints: 2048
max_epoch: 300
model:
  NAME: PointM2AE_Pretrain
  pretrain_dataset: HELIAS
  mask_ratio: 0.8
  group_sizes:
    - 16
    - 8
    - 8
  num_groups:
    - 512
    - 256
    - 64
  encoder_depths:
    - 5
    - 5
    - 5
  encoder_dims:
    - 96
    - 192
    - 384
  local_radius:
    - 0.32
    - 0.64
    - 1.28
  decoder_depths:
    - 1
    - 1
  decoder_dims:
    - 384
    - 192
  decoder_up_blocks:
    - 1
    - 1
  drop_path_rate: 0.1
  num_heads: 6
npoints: 2048
optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.05
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
step_per_update: 1
pretrain_augmentation: z_rotate_tree  # augmentation applied during pretraining (see datasets/augmentation.py AUGMENTATION_REGISTRY)
