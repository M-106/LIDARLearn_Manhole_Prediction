optimizer:
  type: AdamW
  kwargs:
    lr: 0.0005
    weight_decay: 0.05
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: train
      K_FOLDS: 5
      fold: 0
      bs: 16
  val:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: val
      K_FOLDS: 5
      fold: 0
      bs: 16
model:
  NAME: PointM2AE
  init_source: ShapeNet
  base_model: PointM2AE
  finetuning_strategy: Full Finetuning
  label_smoothing: 0.0
  num_classes: 7
  group_sizes:
  - 16
  - 8
  - 8
  num_groups:
  - 512
  - 256
  - 64
  smooth: 0.3
  encoder_depths:
  - 5
  - 5
  - 5
  encoder_dims:
  - 96
  - 192
  - 384
  local_radius:
  - 0.32
  - 0.64
  - 1.28
  drop_path_rate: 0.1
  num_heads: 6
npoints: 1024
step_per_update: 1
max_epoch: 250
grad_norm_clip: 10
