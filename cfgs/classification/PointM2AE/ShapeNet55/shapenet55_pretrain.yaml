dataset:
  train:
    _base_: cfgs/dataset/ShapeNet55Pretrain.yaml
    others:
      subset: train
      npoints: 1024
      whole: true
      bs: 64
  val:
    _base_: cfgs/dataset/ShapeNet55Pretrain.yaml
    others:
      subset: test
      npoints: 1024
      bs: 32
max_epoch: 300
model:
  NAME: PointM2AE_Pretrain
  pretrain_dataset: ShapeNet55
  mask_ratio: 0.8
  group_sizes:
    - 16
    - 8
    - 8
  num_groups:
    - 512
    - 256
    - 64
  encoder_depths:
    - 5
    - 5
    - 5
  encoder_dims:
    - 96
    - 192
    - 384
  local_radius:
    - 0.32
    - 0.64
    - 1.28
  decoder_depths:
    - 1
    - 1
  decoder_dims:
    - 384
    - 192
  decoder_up_blocks:
    - 1
    - 1
  drop_path_rate: 0.1
  num_heads: 6
npoints: 1024
optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.05
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
step_per_update: 1
pretrain_augmentation: none
