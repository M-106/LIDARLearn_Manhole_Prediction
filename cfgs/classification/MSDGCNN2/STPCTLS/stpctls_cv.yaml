optimizer:
  type: AdamW
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: train
      K_FOLDS: 5
      fold: 0
      bs: 16
  val:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: val
      K_FOLDS: 5
      fold: 0
      bs: 16
model:
  NAME: MSDGCNN2
  label_smoothing: 0.0
  channels_input: 3
  num_classes: 7
  k_scales:
  - 5
  - 20
  - 30
  emb_dims: 1024
  dropout: 0.4
  # === Ablation parameters (optional, defaults shown) ===
  # use_multiscale: true           # false = single-scale (local only)
  # use_normalized_features: true  # false = no normalized relative features in branch
  # fusion_type: concat_conv       # options: concat_conv, concat_only, add, attention, gated, bilinear, se_fusion
  # branch_feature_mode: full      # options: full (xyz+rel+norm), normalized_only (only norm)
  # local_use_normalized: false    # true = add normalized features to local scale
npoints: 1024
step_per_update: 1
max_epoch: 250
grad_norm_clip: 10
