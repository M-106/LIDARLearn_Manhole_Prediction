optimizer:
  type: AdamW
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: train
      K_FOLDS: 5
      fold: 0
      bs: 16
  val:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      subset: val
      K_FOLDS: 5
      fold: 0
      bs: 16
model:
  NAME: PointMLP
  label_smoothing: 0.0
  points: 1024
  embed_dim: 64
  groups: 1
  res_expansion: 1.0
  activation: relu
  bias: false
  use_xyz: false
  normalize: anchor
  dim_expansion:
  - 2
  - 2
  - 2
  - 2
  pre_blocks:
  - 2
  - 2
  - 2
  - 2
  pos_blocks:
  - 2
  - 2
  - 2
  - 2
  k_neighbors:
  - 24
  - 24
  - 24
  - 24
  reducers:
  - 2
  - 2
  - 2
  - 2
  dropout: 0.5
  num_classes: 7
  channels: 3
npoints: 1024
step_per_update: 1
max_epoch: 250
grad_norm_clip: 10
