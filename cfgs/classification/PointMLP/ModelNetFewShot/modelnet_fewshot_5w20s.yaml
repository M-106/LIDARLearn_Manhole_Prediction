dataset:
  train:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: train
      way: 5
      shot: 20
      fold: 0
  val:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: test
      way: 5
      shot: 20
      fold: 0
grad_norm_clip: 10
max_epoch: 150
model:
  NAME: PointMLP
  activation: relu
  bias: false
  channels: 3
  dim_expansion:
  - 2
  - 2
  - 2
  - 2
  dropout: 0.5
  embed_dim: 64
  groups: 1
  k_neighbors:
  - 24
  - 24
  - 24
  - 24
  label_smoothing: 0.0
  normalize: anchor
  num_classes: 5
  points: 1024
  pos_blocks:
  - 2
  - 2
  - 2
  - 2
  pre_blocks:
  - 2
  - 2
  - 2
  - 2
  reducers:
  - 2
  - 2
  - 2
  - 2
  res_expansion: 1.0
  use_xyz: false
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
