dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetPretrain.yaml
    others:
      subset: train
      npoints: 2048
  val:
    _base_: cfgs/dataset/TreeDatasetPretrain.yaml
    others:
      subset: val
      npoints: 2048
  extra_train:
    _base_: cfgs/dataset/TreeDatasetPretrain.yaml
    others:
      subset: extra_train
      npoints: 2048
max_epoch: 300
model:
  NAME: PointBERT_Pretrain
  pretrain_dataset: HELIAS
  m: 0.999
  T: 0.07
  K: 16384
  transformer_config:
    mask_ratio:
      - 0.25
      - 0.45
    trans_dim: 384
    depth: 12
    drop_path_rate: 0.1
    cls_dim: 512
    replace_pob: 0.0
    num_heads: 6
    moco_loss: false
    dvae_loss: true
    cutmix_loss: true
    return_all_tokens: false
  dvae_config:
    group_size: 32
    num_group: 64
    encoder_dims: 256
    num_tokens: 8192
    tokens_dims: 256
    decoder_dims: 256
    ckpt: pretrained/dVAE.pth
optimizer:
  type: AdamW
  kwargs:
    lr: 0.0005
    weight_decay: 0.05
scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 3
step_per_update: 1
pretrain_augmentation: z_rotate_tree  # augmentation applied during pretraining (see datasets/augmentation.py AUGMENTATION_REGISTRY)
consider_metric: CDL1
