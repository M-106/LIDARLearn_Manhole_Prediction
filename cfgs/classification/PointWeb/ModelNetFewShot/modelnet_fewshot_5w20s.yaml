dataset:
  train:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: train
      way: 5
      shot: 20
      fold: 0
  val:
    _base_: cfgs/dataset/ModelNet40FewShot.yaml
    others:
      K_FOLDS: 10
      bs: 16
      subset: test
      way: 5
      shot: 20
      fold: 0
grad_norm_clip: 10
max_epoch: 150
model:
  NAME: PointWeb
  channels: 0
  dropout1: 0.5
  dropout2: 0.5
  label_smoothing: 0.0
  npoint1: 512
  npoint2: 256
  npoint3: 64
  npoint4: 16
  nsample: 32
  num_classes: 5
  use_xyz: true
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
