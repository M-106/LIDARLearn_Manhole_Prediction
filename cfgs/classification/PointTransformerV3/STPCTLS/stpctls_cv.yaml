dataset:
  train:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: train
  val:
    _base_: cfgs/dataset/TreeDatasetCV.yaml
    others:
      K_FOLDS: 1
      bs: 16
      subset: val
grad_norm_clip: 10
max_epoch: 250
model:
  NAME: PointTransformerV3
  channels_input: 3
  label_smoothing: 0.0
  num_classes: 7
  grid_size: 0.01
  enc_depths: [2, 2, 2, 6, 2]
  enc_channels: [32, 64, 128, 256, 512]
  enc_num_head: [2, 4, 8, 16, 32]
  enc_patch_size: [48, 48, 48, 48, 48]
  stride: [2, 2, 2, 2]
  drop_path_rate: 0.3
  enable_flash: false
npoints: 1024
optimizer:
  kwargs:
    lr: 0.0005
    weight_decay: 0.0001
  type: AdamW
scheduler:
  kwargs:
    initial_epochs: 10
  type: CosLR
step_per_update: 1
