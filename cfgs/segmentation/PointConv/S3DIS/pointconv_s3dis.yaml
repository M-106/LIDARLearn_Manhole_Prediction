dataset:
  train:
    _base_: cfgs/dataset/S3DIS.yaml
    others:
      bs: 16
      subset: train
      test_area: 5
      feature_mode: xyz
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/S3DIS.yaml
    others:
      bs: 16
      subset: val
      test_area: 5
      feature_mode: xyz
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 100
npoints: 2048
step_per_update: 1

model:
  NAME: PointConv_Seg
  seg_classes: 13
  num_obj_classes: 1
  use_cls_label: False
  channels: 3
  nsample1: 32
  nsample2: 32
  nsample3: 32
  bandwidth1: 0.1
  bandwidth2: 0.2
  bandwidth3: 0.4
  bandwidth4: 0.8
  dropout: 0.5

optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.0001

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
