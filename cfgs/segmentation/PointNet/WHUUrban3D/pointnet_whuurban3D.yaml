dataset:
  train:
    _base_: cfgs/dataset/WHUUrban3DDataset.yaml
    others:
      bs: 16
      subset: train
      test_area: 5
      feature_mode: xyzi
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/WHUUrban3DDataset.yaml
    others:
      bs: 16
      subset: val
      test_area: 5
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 100
npoints: 2048
step_per_update: 1

model:
  NAME: PointCentricSeg
  adapter_name: PointNet
  seg_classes: 2
  num_obj_classes: 1
  use_cls_label: False
  dropout: 0.5
  backbone:
    NAME: PointNet
    input_channels: 4
    emb_dims: 1024
    dropout: 0.4
    num_classes: 2
    feature_transform: true
    label_smoothing: 0.0

optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.0001

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
