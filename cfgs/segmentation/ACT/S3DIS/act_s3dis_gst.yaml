dataset:
  train:
    _base_: cfgs/dataset/S3DIS.yaml
    others:
      bs: 16
      subset: train
      test_area: 5
      feature_mode: xyz
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/S3DIS.yaml
    others:
      bs: 16
      subset: val
      test_area: 5
      feature_mode: xyz
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 100
npoints: 2048
step_per_update: 1

model:
  NAME: PointGST_Seg
  init_source: ShapeNet
  base_model: ACT
  seg_classes: 13
  num_obj_classes: 1
  use_cls_label: False
  finetuning_strategy: GST
  trans_dim: 384
  depth: 12
  num_heads: 6
  encoder_dims: 384
  num_group: 64
  group_size: 32
  drop_path_rate: 0.1
  rank: 36
  local: 32
  label_smoothing: 0.0

optimizer:
  type: AdamW
  kwargs:
    lr: 0.0003
    weight_decay: 0.0001
  part: adapt

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
