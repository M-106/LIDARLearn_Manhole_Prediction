dataset:
  train:
    _base_: cfgs/dataset/S3DIS.yaml
    others:
      bs: 16
      subset: train
      test_area: 5
      feature_mode: xyz
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/S3DIS.yaml
    others:
      bs: 16
      subset: val
      test_area: 5
      feature_mode: xyz
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 100
npoints: 2048
step_per_update: 1

model:
  NAME: DELA_Seg
  seg_classes: 13
  num_obj_classes: 1
  use_cls_label: False
  depths: [4, 4, 4, 4]
  dims: [96, 192, 320, 512]
  ns: [2048, 512, 192, 64]
  ks: [20, 20, 20, 20]
  nbr_dims: [48, 48]
  head_dim: 320
  head_drops: [0., 0.05, 0.1, 0.2]
  drop_path: 0.15
  mlp_ratio: 2
  bn_momentum: 0.1
  cor_std: [2.8, 5.3, 10, 20]

optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.0001

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
