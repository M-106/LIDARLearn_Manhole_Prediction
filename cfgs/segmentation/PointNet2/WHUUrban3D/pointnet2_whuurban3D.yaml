dataset:
  train:
    _base_: cfgs/dataset/WHUUrban3DDataset.yaml
    others:
      bs: 12
      subset: train
      test_area: 5
      feature_mode: xyzi
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/WHUUrban3DDataset.yaml
    others:
      bs: 12
      subset: val
      test_area: 5
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 300
step_per_update: 1

model: 
  channels: 4
  NAME: PointNet2_MSG_Seg
  seg_classes: 2
  num_obj_classes: 1
  use_cls_label: False
  dropout: 0.5

optimizer:
  type: AdamW
  kwargs:
    lr: 0.001  # 0.0003
    weight_decay: 0.0001

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
