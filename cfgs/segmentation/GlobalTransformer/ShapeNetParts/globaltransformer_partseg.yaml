dataset:
  train:
    _base_: cfgs/dataset/ShapeNetPartsH5.yaml
    others:
      bs: 8
      subset: trainval
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/ShapeNetPartsH5.yaml
    others:
      bs: 8
      subset: test
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 300
npoints: 2048
step_per_update: 1

model:
  NAME: GlobalTransformer_Seg
  seg_classes: 50
  num_obj_classes: 16
  use_cls_label: True
  channels: 3
  emb_dims: 512
  depth: 4
  heads: 8
  dim_head: 64
  patch_dim: 256
  attn_dropout: 0.0
  ff_dropout: 0.0
  dropout: 0.5

optimizer:
  type: AdamW
  kwargs:
    lr: 0.0003
    weight_decay: 0.0001

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
