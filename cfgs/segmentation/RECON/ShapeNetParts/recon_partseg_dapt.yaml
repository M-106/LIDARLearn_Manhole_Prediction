dataset:
  train:
    _base_: cfgs/dataset/ShapeNetPartsH5.yaml
    others:
      bs: 8
      subset: trainval
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/ShapeNetPartsH5.yaml
    others:
      bs: 8
      subset: test
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 300
npoints: 2048
step_per_update: 1

model:
  NAME: DAPT_Seg
  init_source: ShapeNet
  base_model: RECON
  seg_classes: 50
  num_obj_classes: 16
  use_cls_label: True
  finetuning_strategy: DAPT
  trans_dim: 384
  depth: 12
  num_heads: 6
  encoder_dims: 384
  num_group: 128
  group_size: 32
  drop_path_rate: 0.1
  rank: 72
  drop_adapter_rate: 0
  drop_rate: 0.0
  class_token: use
  patch_token: max
  prompt_token: None
  label_smoothing: 0.0

optimizer:
  type: AdamW
  kwargs:
    lr: 0.0003
    weight_decay: 0.0001
  part: dapt

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
