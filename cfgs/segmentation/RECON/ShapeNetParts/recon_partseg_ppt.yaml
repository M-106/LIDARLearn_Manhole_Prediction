dataset:
  train:
    _base_: cfgs/dataset/ShapeNetPartsH5.yaml
    others:
      bs: 8
      subset: trainval
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/ShapeNetPartsH5.yaml
    others:
      bs: 8
      subset: test
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 300
npoints: 2048
step_per_update: 1

model:
  NAME: PPT_Seg
  init_source: ShapeNet
  base_model: RECON
  seg_classes: 50
  num_obj_classes: 16
  use_cls_label: True
  finetuning_strategy: PPT
  trans_dim: 384
  embed_dim: 384
  depth: 12
  num_heads: 6
  num_group: 128
  group_size: 32
  drop_path_rate: 0.3
  type: pos
  label_smoothing: 0.0

optimizer:
  type: AdamW
  kwargs:
    lr: 0.0003
    weight_decay: 0.0001
  part: ppt

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
