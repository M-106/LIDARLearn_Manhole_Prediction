dataset:
  train:
    _base_: cfgs/dataset/S3DIS.yaml
    others:
      bs: 16
      subset: train
      test_area: 5
      feature_mode: xyz
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/S3DIS.yaml
    others:
      bs: 16
      subset: val
      test_area: 5
      feature_mode: xyz
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 100
npoints: 2048
step_per_update: 1

model:
  NAME: PointCentricSeg
  adapter_name: KANDGCNN
  seg_classes: 13
  num_obj_classes: 1
  use_cls_label: False
  dropout: 0.5
  backbone:
    NAME: KANDGCNN
    channels_input: 3
    k: 20
    emb_dims: 1024
    num_classes: 13
    label_smoothing: 0.0

optimizer:
  type: AdamW
  kwargs:
    lr: 0.001
    weight_decay: 0.0001

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
