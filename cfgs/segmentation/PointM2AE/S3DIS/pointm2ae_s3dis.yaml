dataset:
  train:
    _base_: cfgs/dataset/S3DIS.yaml
    others:
      bs: 16
      subset: train
      test_area: 5
      feature_mode: xyz
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/S3DIS.yaml
    others:
      bs: 16
      subset: val
      test_area: 5
      feature_mode: xyz
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 100
npoints: 2048
step_per_update: 1

model:
  NAME: PointM2AE_Seg
  init_source: ShapeNet
  base_model: PointM2AE
  seg_classes: 13
  num_obj_classes: 1
  use_cls_label: False
  finetuning_strategy: Full Finetuning
  num_heads: 6
  encoder_depths: [5, 5, 5]
  encoder_dims: [96, 192, 384]
  num_groups: [512, 256, 64]
  group_sizes: [16, 8, 8]
  local_radius: [0.32, 0.64, 1.28]
  drop_path_rate: 0.1
  smooth: 0.3
  label_smoothing: 0.0

optimizer:
  type: AdamW
  kwargs:
    lr: 0.0003
    weight_decay: 0.0001

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
