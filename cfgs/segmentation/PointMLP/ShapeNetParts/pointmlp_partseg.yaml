dataset:
  train:
    _base_: cfgs/dataset/ShapeNetPartsH5.yaml
    others:
      bs: 8
      subset: trainval
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/ShapeNetPartsH5.yaml
    others:
      bs: 8
      subset: test
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 300
npoints: 2048
step_per_update: 1

model:
  NAME: PointMLP_Seg
  seg_classes: 50
  num_obj_classes: 16
  use_cls_label: True
  points: 2048
  embed_dim: 64
  groups: 1
  res_expansion: 1.0
  activation: relu
  bias: true
  use_xyz: true
  normalize: anchor
  dim_expansion: [2, 2, 2, 2]
  pre_blocks: [2, 2, 2, 2]
  pos_blocks: [2, 2, 2, 2]
  k_neighbors: [32, 32, 32, 32]
  reducers: [4, 4, 4, 4]
  de_dims: [512, 256, 128, 128]
  de_blocks: [4, 4, 4, 4]
  gmp_dim: 64
  cls_dim: 64
  dropout: 0.5

optimizer:
  type: AdamW
  kwargs:
    lr: 0.0003
    weight_decay: 0.0001

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
