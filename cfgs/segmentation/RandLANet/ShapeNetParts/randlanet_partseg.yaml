dataset:
  train:
    _base_: cfgs/dataset/ShapeNetPartsH5.yaml
    others:
      bs: 8
      subset: trainval
      K_FOLDS: 1
  val:
    _base_: cfgs/dataset/ShapeNetPartsH5.yaml
    others:
      bs: 8
      subset: test
      K_FOLDS: 1

grad_norm_clip: 10
max_epoch: 300
npoints: 2048
step_per_update: 1

model:
  NAME: RandLANet_Seg
  seg_classes: 50
  num_obj_classes: 16
  use_cls_label: False
  channels: 3
  k: 16
  decimation: 4
  d_encoder: 8
  num_stages: 4
  dropout: 0.5

optimizer:
  type: AdamW
  kwargs:
    lr: 0.0003
    weight_decay: 0.0001

scheduler:
  type: CosLR
  kwargs:
    initial_epochs: 10
